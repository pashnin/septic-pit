
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Septic Pit</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 20px; line-height: 1.4; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: baseline; }
    .muted { opacity: 0.75; }
    .card { border: 1px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 12px 14px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.1); text-align: left; }
    th { position: sticky; top: 0; background: #fff; }
    .btn { padding: 8px 10px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.2); background: #fff; cursor: pointer; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #b00020; white-space: pre-wrap; }
    .ok { color: #1b5e20; }
    .nowrap { white-space: nowrap; }
    @media (prefers-color-scheme: dark) {
      body { background: #0b0b0f; color: #e8e8ee; }
      .card { border-color: rgba(255,255,255,0.12); }
      th { background: #0b0b0f; }
      th, td { border-bottom-color: rgba(255,255,255,0.10); }
      .btn { background: #12121a; color: #e8e8ee; border-color: rgba(255,255,255,0.18); }
      .muted { opacity: 0.78; }
    }
  </style>
</head>
<body>
  <div class="row">
    <h1 style="margin:0;">Septic Pit</h1>
    <span id="status" class="muted"></span>
  </div>

  <div class="row" style="margin-top: 10px;">
    <button id="reloadBtn" class="btn">Обновить</button>
    <span id="freshness" class="muted"></span>
  </div>

  <div id="meta" class="card" style="margin-top: 12px;">
    <div class="row">
      <div><b>Источник:</b> <span id="sourceLabel" class="muted"></span></div>
    </div>
    <div id="errorBox" class="error" style="margin-top: 8px; display:none;"></div>
  </div>

  <div id="tableWrap" class="card" style="margin-top: 12px;">
    <div class="muted">Данные:</div>
    <div style="overflow:auto; max-height: 70vh;">
      <table id="tbl"></table>
    </div>
  </div>

<script>
(() => {
  // 1) Основной источник CSV (Google Sheets export)
  const SHEET_CSV_URL =
    "https://docs.google.com/spreadsheets/d/1iwjEdSiXEiLN6kiji0PIn24oQN2F-iC1ohLq_dMh7iQ/export?format=csv";

  // 2) Fallback (опционально): можно указать raw GitHub или твой хостинг
  // Например:
  // const FALLBACK_CSV_URL = "https://raw.githubusercontent.com/<user>/<repo>/main/data.csv";
  const FALLBACK_CSV_URL = "";

  // Кеш в localStorage
  const CACHE_KEY = "septic_csv_cache_v1";
  const CACHE_TTL_MS = 5 * 60 * 1000; // 5 минут

  const els = {
    status: document.getElementById("status"),
    freshness: document.getElementById("freshness"),
    sourceLabel: document.getElementById("sourceLabel"),
    errorBox: document.getElementById("errorBox"),
    reloadBtn: document.getElementById("reloadBtn"),
    tbl: document.getElementById("tbl"),
  };

  function setStatus(text, ok=true) {
    els.status.textContent = text || "";
    els.status.className = ok ? "ok" : "error";
  }

  function showError(err) {
    els.errorBox.style.display = "block";
    els.errorBox.textContent = String(err || "Unknown error");
  }

  function clearError() {
    els.errorBox.style.display = "none";
    els.errorBox.textContent = "";
  }

  function nowLabel() {
    const d = new Date();
    return d.toLocaleString("ru-RU", { hour12: false });
  }

  function parseCsv(text) {
    // Минималистичный CSV parser:
    // - поддержка кавычек
    // - разделитель авто: ';' если он встречается чаще, иначе ','
    const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n").filter(l => l.trim().length);
    if (!lines.length) return [];

    const delim = (lines[0].split(";").length > lines[0].split(",").length) ? ";" : ",";

    const rows = [];
    for (const line of lines) {
      const row = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];

        if (ch === '"') {
          // двойные кавычки внутри кавычек
          if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
          else inQuotes = !inQuotes;
          continue;
        }

        if (!inQuotes && ch === delim) {
          row.push(cur);
          cur = "";
          continue;
        }

        cur += ch;
      }
      row.push(cur);

      // trim ячеек
      rows.push(row.map(c => c.trim()));
    }
    return rows;
  }

  function normalizeValue(v) {
    // Приводим "0,676" -> 0.676 (только если это похоже на число)
    if (typeof v !== "string") return v;
    const s = v.trim();
    if (/^-?\d+,\d+$/.test(s)) return Number(s.replace(",", "."));
    if (/^-?\d+(\.\d+)?$/.test(s)) return Number(s);
    return s;
  }

  function renderTable(rows) {
    els.tbl.innerHTML = "";
    if (!rows || !rows.length) {
      els.tbl.innerHTML = "<tr><td class='muted'>Пусто</td></tr>";
      return;
    }

    const head = rows[0];
    const body = rows.slice(1);

    const thead = document.createElement("thead");
    const trh = document.createElement("tr");
    for (const h of head) {
      const th = document.createElement("th");
      th.textContent = h;
      trh.appendChild(th);
    }
    thead.appendChild(trh);

    const tbody = document.createElement("tbody");
    for (const r of body) {
      const tr = document.createElement("tr");
      for (let i = 0; i < head.length; i++) {
        const td = document.createElement("td");
        const val = r[i] ?? "";
        const norm = normalizeValue(val);
        td.textContent = (typeof norm === "number" && Number.isFinite(norm)) ? String(norm) : String(val);
        if (head[i]?.toLowerCase?.() === "date" || head[i]?.toLowerCase?.() === "time") td.classList.add("nowrap");
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }

    els.tbl.appendChild(thead);
    els.tbl.appendChild(tbody);
  }

  async function fetchText(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(`Fetch failed: ${r.status} ${r.statusText}`);
    return await r.text();
  }

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (!obj || !obj.t || !obj.csv) return null;
      if (Date.now() - obj.t > CACHE_TTL_MS) return null;
      return obj;
    } catch {
      return null;
    }
  }

  function saveCache(csvText, sourceUrl) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), csv: csvText, source: sourceUrl }));
    } catch {}
  }

  function setFreshnessLabel(loadedAtMs) {
    const d = new Date(loadedAtMs);
    els.freshness.textContent = `Данные актуальны на: ${d.toLocaleString("ru-RU", { hour12: false })}`;
  }

  async function loadData({ force = false } = {}) {
    clearError();
    els.reloadBtn.disabled = true;

    try {
      setStatus("Загрузка…", true);

      if (!force) {
        const c = loadCache();
        if (c) {
          els.sourceLabel.textContent = c.source || "cache";
          renderTable(parseCsv(c.csv));
          setFreshnessLabel(c.t);
          setStatus("ОК (из кеша)", true);
          return;
        }
      }

      // основной источник
      els.sourceLabel.textContent = SHEET_CSV_URL;
      const csvText = await fetchText(SHEET_CSV_URL);
      renderTable(parseCsv(csvText));
      saveCache(csvText, SHEET_CSV_URL);
      setFreshnessLabel(Date.now());
      setStatus("ОК", true);
      return;

    } catch (e1) {
      // fallback
      if (FALLBACK_CSV_URL) {
        try {
          els.sourceLabel.textContent = FALLBACK_CSV_URL;
          const csvText2 = await fetchText(FALLBACK_CSV_URL);
          renderTable(parseCsv(csvText2));
          saveCache(csvText2, FALLBACK_CSV_URL);
          setFreshnessLabel(Date.now());
          setStatus("ОК (fallback)", true);
          return;
        } catch (e2) {
          showError(`Основной источник упал:\n${e1}\n\nFallback тоже упал:\n${e2}`);
          setStatus("Ошибка", false);
        }
      } else {
        showError(e1);
        setStatus("Ошибка", false);
      }
    } finally {
      els.reloadBtn.disabled = false;
    }
  }

  els.reloadBtn.addEventListener("click", () => loadData({ force: true }));
  loadData({ force: false });
})();
</script>
</body>
</html>
